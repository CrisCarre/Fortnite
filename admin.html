<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · THE_CARRE</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-error {
      font-size: 13px;
      color: #e05555;
      font-family: var(--bebas);
      letter-spacing: 1px;
      margin-top: 10px;
      min-height: 20px;
      text-align: center
    }

    .btn-fire:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .logout-btn {
      font-family: var(--bebas);
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      cursor: pointer;
      transition: color .15s, border-color .15s
    }

    .logout-btn:hover {
      color: #e05555;
      border-color: #e05555
    }

    .admin-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 1.5rem
    }

    .admin-tab {
      font-family: var(--bebas);
      font-size: 18px;
      letter-spacing: 2px;
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color .2s
    }

    .admin-tab::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--orange);
      transform: scaleX(0);
      transition: transform .2s
    }

    .admin-tab.active {
      color: var(--orange)
    }

    .admin-tab.active::after {
      transform: scaleX(1)
    }

    .admin-tab.esp.active {
      color: #c87fff
    }

    .admin-tab.esp::after {
      background: #c87fff
    }

    .fselect {
      background: var(--bg);
      border: 1px solid rgba(255, 106, 0, .3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--barlow);
      font-size: 15px;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
      width: 100%
    }

    .fselect:focus {
      border-color: var(--orange)
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem
    }

    .filter-tab {
      font-family: var(--bebas);
      font-size: 13px;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s
    }

    .filter-tab.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #0c0800
    }

    .mapa-badge {
      font-family: var(--bebas);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0
    }

    .mapa-badge.volcano {
      background: rgba(255, 106, 0, .15);
      color: var(--orange);
      border: 1px solid rgba(255, 106, 0, .3)
    }

    .mapa-badge.rocket {
      background: rgba(100, 160, 255, .15);
      color: #6aa0ff;
      border: 1px solid rgba(100, 160, 255, .3)
    }

    /* TABLA SEGUIDORES */
    .esp-table-wrap {
      overflow-x: auto;
      margin-bottom: 1rem
    }

    .esp-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--barlow)
    }

    .esp-table th {
      font-family: var(--bebas);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap
    }

    .esp-table td {
      padding: 0;
      border-bottom: 1px solid rgba(255, 106, 0, .06);
      position: relative
    }

    .esp-table tr:hover td {
      background: rgba(255, 106, 0, .04)
    }

    .esp-table tr.dragging td {
      opacity: .35
    }

    .esp-table tr.drag-over td {
      border-top: 2px solid var(--gold)
    }

    .cell-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--barlow);
      font-size: 14px;
      padding: 10px 10px;
      width: 100%;
      min-width: 90px
    }

    .cell-input:focus {
      background: rgba(255, 106, 0, .07);
      border-radius: 4px
    }

    .cell-select {
      background: #0c0800;
      border: 1px solid rgba(255, 106, 0, .2);
      border-radius: 6px;
      outline: none;
      color: var(--text);
      font-family: var(--barlow);
      font-size: 13px;
      padding: 6px 6px;
      width: 100%;
      cursor: pointer;
      min-width: 100px
    }

    .cell-select:focus {
      border-color: var(--orange)
    }

    .drag-handle-td {
      width: 28px;
      text-align: center;
      cursor: grab;
      color: var(--muted);
      font-size: 15px;
      padding: 8px 4px !important;
      user-select: none
    }

    .pos-td {
      width: 26px;
      font-family: var(--bebas);
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 8px 4px !important
    }

    .del-td {
      width: 44px;
      text-align: center;
      padding: 4px 6px !important
    }

    .save-td {
      width: 80px;
      text-align: center;
      padding: 4px 6px !important
    }

    .del-btn {
      background: transparent;
      border: 1px solid rgba(224, 85, 85, .3);
      color: #e05555;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      transition: all .15s;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      min-height: 28px
    }

    .del-btn:hover {
      background: rgba(224, 85, 85, .15);
      border-color: #e05555
    }

    .save-row-btn {
      background: var(--orange);
      border: none;
      color: #0c0800;
      font-family: var(--bebas);
      font-size: 13px;
      letter-spacing: 1px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .2s;
      width: 100%
    }

    tr:hover .save-row-btn,
    .save-row-btn.dirty {
      opacity: 1
    }

    .save-row-btn.saved {
      background: #55c47a;
      color: #0c0800
    }

    /* RAREZA BADGES */
    .rareza-galaxy {
      color: #d0a0ff
    }

    .rareza-gominola {
      color: #ff80ab
    }

    .rareza-oro {
      color: var(--gold)
    }

    .rareza-normal {
      color: var(--muted)
    }

    option {
      background: #1a0e00;
      color: var(--text)
    }

    .add-row-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px dashed rgba(180, 100, 255, .3);
      border-radius: 8px;
      padding: 10px 16px;
      color: #c87fff;
      font-family: var(--bebas);
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      width: 100%;
      transition: all .15s;
      margin-bottom: 1rem
    }

    .add-row-btn:hover {
      border-color: #c87fff;
      background: rgba(180, 100, 255, .08)
    }
  </style>
</head>

<body>
  <canvas id="fire-canvas"></canvas>
  <div class="page">

    <div class="topbar">
      <div>
        <div class="brand"><span>THE</span>_CARRE</div>
        <div class="brand-sub">Panel de administración</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="user-pill" style="display:none">
          <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
        </div>
        <a href="index.html" class="back">← Ver ranking</a>
      </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <img src="logo.png" alt="THE_CARRE" class="login-logo">
        <div class="login-title">Acceso Admin</div>
        <div style="margin-bottom:10px;text-align:left">
          <div class="flabel" style="margin-bottom:5px">Email</div>
          <input type="text" id="login-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div style="margin-bottom:14px;text-align:left">
          <div class="flabel" style="margin-bottom:5px">Contraseña</div>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-fire btn-full" id="login-btn" onclick="doLogin()">Entrar</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>

    <!-- PANEL -->
    <div id="admin-screen" style="display:none">
      <div class="container" style="padding-top:1.5rem">

        <div class="admin-tabs">
          <button class="admin-tab active" onclick="switchTab('torneo',this)">🏆 Torneo</button>
          <button class="admin-tab esp" onclick="switchTab('espiritus',this)">👻 Seguidores</button>
        </div>

        <!-- TORNEO -->
        <div id="tab-torneo">
          <div class="card">
            <div class="card-title">Estado del torneo</div>
            <div class="semana-row">
              <div>
                <div class="semana-lbl">Semana actual</div>
                <div class="semana-val" id="semana-val">1</div>
              </div>
              <div style="text-align:right">
                <div class="semana-warn">Resetea puntos de todos los mapas</div>
                <button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="resetSemana()">↺ Nueva
                  semana</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">Añadir jugador</div>
            <div class="form-row" style="grid-template-columns:1fr 1fr 1fr auto">
              <div>
                <div class="flabel">Nombre Epic</div>
                <input type="text" id="new-nombre" placeholder="NombreFortnite" maxlength="32">
              </div>
              <div>
                <div class="flabel">Mapa</div>
                <select class="fselect" id="new-mapa">
                  <option value="volcano">🌋 Volcano Parkour</option>
                  <option value="rocket">⚽ Rocket Soccer</option>
                </select>
              </div>
              <div>
                <div class="flabel">Puntos</div>
                <input type="number" id="new-pts" placeholder="0" min="0" max="9999" value="0">
              </div>
              <button class="btn btn-fire" onclick="addJugador()" style="margin-top:19px">+ Añadir</button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">Jugadores</div>
            <div class="filter-tabs">
              <button class="filter-tab active" onclick="setFilter('all',this)">Todos</button>
              <button class="filter-tab" onclick="setFilter('volcano',this)">🌋 Volcano</button>
              <button class="filter-tab" onclick="setFilter('rocket',this)">⚽ Rocket</button>
            </div>
            <div class="jugador-list" id="jugador-list">
              <div class="empty">Cargando...</div>
            </div>
          </div>
        </div>

        <!-- SEGUIDORES -->
        <div id="tab-espiritus" style="display:none">
          <div class="card">
            <div class="card-title">Seguidores — edita y guarda fila a fila</div>
            <div class="esp-table-wrap">
              <table class="esp-table">
                <thead>
                  <tr>
                    <th></th>
                    <th>#</th>
                    <th>Usuario</th>
                    <th>Alias</th>
                    <th>Espíritu</th>
                    <th>Rareza</th>
                    <th>Estado</th>
                    <th></th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="esp-tbody"></tbody>
              </table>
            </div>
            <button class="add-row-btn" onclick="addEspRow()">+ Añadir seguidor</button>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="fire.js"></script>
  <script>
    const SUPABASE_URL = 'https://tuucrcdvzenrpmoqqnqz.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1dWNyY2R2emVucnBtb3FxbnF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDI5NTEsImV4cCI6MjA5NzI3ODk1MX0.tQA6dChjvv4Rf1VtNFLZMbRMhuMtWhOnueb9J2QShI8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let jugadores = [], espiritus = [], semanaActual = 1, filtro = 'all', dragSrc = null;

    const ESPIRITUS_OPTS = ['Zero', 'Fantasma', 'Demonio', 'Dormilón', 'Punk', 'Agua', 'Fuego', 'Tierra', 'Pato', 'Cacahuete'];
    const RAREZA_OPTS = ['Normal', 'Oro', 'Gominola', 'Galaxy'];
    const ESTADO_OPTS = { esperando: '⏳ Esperando', completado: '✅ Completado', ausente: '😶 Ausente', estafador: '❌ Estafador' };

    // ── AUTH ──
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        document.getElementById('user-pill').style.display = 'block';
        loadTorneo(); loadEspiritus();
      } else {
        document.getElementById('login-screen').style.display = '';
        document.getElementById('admin-screen').style.display = 'none';
        document.getElementById('user-pill').style.display = 'none';
      }
    });

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      if (!email || !pass) { err.textContent = 'Rellena los campos'; return; }
      btn.disabled = true; btn.textContent = 'Entrando...'; err.textContent = '';
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      btn.disabled = false; btn.textContent = 'Entrar';
      if (error) err.textContent = 'Email o contraseña incorrectos';
    }
    async function doLogout() { await sb.auth.signOut(); }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
      document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });
    });

    function switchTab(tab, btn) {
      document.getElementById('tab-torneo').style.display = tab === 'torneo' ? '' : 'none';
      document.getElementById('tab-espiritus').style.display = tab === 'espiritus' ? '' : 'none';
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    // ══ TORNEO ══
    async function loadTorneo() {
      const { data } = await sb.from('torneo').select('*').order('puntos', { ascending: false });
      const { data: cfg } = await sb.from('config').select('value').eq('key', 'semana_actual').single();
      semanaActual = cfg ? parseInt(cfg.value) : 1;
      jugadores = data || [];
      document.getElementById('semana-val').textContent = semanaActual;
      renderTorneoList();
    }
    function setFilter(f, btn) {
      filtro = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTorneoList();
    }
    function renderTorneoList() {
      const el = document.getElementById('jugador-list');
      const lista = filtro === 'all' ? jugadores : jugadores.filter(j => (j.mapa || 'volcano') === filtro);
      if (!lista.length) { el.innerHTML = '<div class="empty">Sin jugadores.</div>'; return; }
      el.innerHTML = lista.map((j, i) => `
    <div class="jugador-row">
      <div class="j-rank">${i + 1}</div>
      <div class="j-av">${ini(j.nombre)}</div>
      <div class="j-name">${j.nombre}</div>
      <span class="mapa-badge ${j.mapa || 'volcano'}">${(j.mapa || 'volcano') === 'volcano' ? '🌋' : '⚽'}</span>
      <input class="pts-input" id="pts-${j.id}" type="number" value="${j.puntos}" min="0" max="9999"
        onkeydown="if(event.key==='Enter') savePoints('${j.id}')">
      <div class="j-actions">
        <button class="btn btn-ghost btn-sm" onclick="savePoints('${j.id}')">Guardar</button>
        <button class="btn btn-danger btn-sm" onclick="delJugador('${j.id}','${j.nombre}')">✕</button>
      </div>
    </div>`).join('');
    }
    async function addJugador() {
      const nombre = document.getElementById('new-nombre').value.trim();
      const mapa = document.getElementById('new-mapa').value;
      const puntos = parseInt(document.getElementById('new-pts').value) || 0;
      if (!nombre) { showToast('Escribe un nombre', true); return; }
      const { error } = await sb.from('torneo').insert([{ nombre, puntos, mapa, semana: semanaActual }]);
      if (error) { showToast('Error: ' + error.message, true); return; }
      document.getElementById('new-nombre').value = '';
      document.getElementById('new-pts').value = '0';
      showToast('Jugador añadido'); loadTorneo();
    }
    async function savePoints(id) {
      const puntos = parseInt(document.getElementById('pts-' + id).value) || 0;
      const { error } = await sb.from('torneo').update({ puntos }).eq('id', id);
      if (error) { showToast('Error al guardar', true); return; }
      showToast('Puntos guardados'); loadTorneo();
    }
    async function delJugador(id, nombre) {
      if (!confirm('¿Eliminar a ' + nombre + '?')) return;
      await sb.from('torneo').delete().eq('id', id);
      showToast('Eliminado'); loadTorneo();
    }
    async function resetSemana() {
      const next = semanaActual + 1;
      if (!confirm('¿Empezar semana ' + next + '?')) return;
      await sb.from('torneo').update({ puntos: 0 }).gte('puntos', 0);
      await sb.from('config').update({ value: String(next) }).eq('key', 'semana_actual');
      showToast('Semana ' + next + ' iniciada'); loadTorneo();
    }

    // ══ SEGUIDORES ══
    async function loadEspiritus() {
      const { data } = await sb.from('espiritus').select('*').order('orden', { ascending: true }).order('created_at', { ascending: true });
      espiritus = data || [];
      renderEspTable();
    }

    function espSelect(field, id, opts, current, extraClass = '') {
      const isObj = !Array.isArray(opts);
      const options = isObj
        ? Object.entries(opts).map(([v, l]) => `<option value="${v}" ${current === v ? 'selected' : ''}>${l}</option>`).join('')
        : opts.map(o => `<option value="${o}" ${current === o ? 'selected' : ''}>${o}</option>`).join('');
      return `<select class="cell-select ${extraClass}" onchange="markRowDirty('${id}'); updateEsp('${id}','${field}',this.value)">${options}</select>`;
    }

    function renderEspTable() {
      const tbody = document.getElementById('esp-tbody');
      if (!espiritus.length) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty" style="padding:1.5rem">Sin seguidores todavía</div></td></tr>';
        return;
      }
      tbody.innerHTML = espiritus.map((e, i) => `
    <tr data-id="${e.id}" data-i="${i}" draggable="true"
      ondragstart="espDragStart(event)" ondragover="espDragOver(event)"
      ondragleave="espDragLeave(event)" ondrop="espDrop(event)" ondragend="espDragEnd(event)">
      <td class="drag-handle-td">⠿</td>
      <td class="pos-td">${i + 1}</td>
      <td><input class="cell-input" value="${e.usuario || ''}" placeholder="@usuario" maxlength="40"
        oninput="markRowDirty('${e.id}'); updateEsp('${e.id}','usuario',this.value)"></td>
      <td><input class="cell-input" value="${e.alias || ''}" placeholder="Alias" maxlength="40"
        oninput="markRowDirty('${e.id}'); updateEsp('${e.id}','alias',this.value)"></td>
      <td>${espSelect('espiritu', e.id, ESPIRITUS_OPTS, e.espiritu || 'Zero')}</td>
      <td>${espSelect('rareza', e.id, RAREZA_OPTS, e.rareza || 'Normal', 'rareza-' + ((e.rareza || 'normal').toLowerCase()))}</td>
      <td>${espSelect('estado', e.id, ESTADO_OPTS, e.estado || 'esperando')}</td>
      <td class="save-td">
        <button class="save-row-btn" id="savebtn-${e.id}" onclick="saveRow('${e.id}')">Guardar</button>
      </td>
      <td class="del-td"><button class="del-btn" onclick="delEsp('${e.id}','${e.usuario}')">✕</button></td>
    </tr>`).join('');
    }

    function markRowDirty(id) {
      const btn = document.getElementById('savebtn-' + id);
      if (btn) btn.classList.add('dirty');
    }

    function updateEsp(id, field, value) {
      const esp = espiritus.find(e => e.id === id);
      if (esp) esp[field] = value;
    }

    function addEspRow() {
      const newId = 'new_' + Date.now();
      espiritus.push({ id: newId, usuario: '', alias: '', espiritu: 'Zero', rareza: 'Normal', estado: 'esperando', orden: espiritus.length, isNew: true });
      renderEspTable();
      // focus en el input de usuario de la nueva fila
      const tbody = document.getElementById('esp-tbody');
      tbody.lastElementChild?.querySelector('.cell-input')?.focus();
      markRowDirty(newId);
    }

    async function saveRow(id) {
      const e = espiritus.find(x => x.id === id);
      if (!e) return;
      const idx = espiritus.indexOf(e);
      const payload = { usuario: e.usuario, alias: e.alias, espiritu: e.espiritu, rareza: e.rareza, estado: e.estado, orden: idx };
      if (e.isNew || String(id).startsWith('new_')) {
        const { data, error } = await sb.from('espiritus').insert([payload]).select().single();
        if (error) { showToast('Error al guardar', true); return; }
        e.id = data.id;
        e.isNew = false;
      } else {
        const { error } = await sb.from('espiritus').update(payload).eq('id', id);
        if (error) { showToast('Error al guardar', true); return; }
      }
      // Marcar como guardado sin recargar toda la tabla
      const btn = document.getElementById('savebtn-' + id);
      if (btn) { btn.classList.remove('dirty'); btn.classList.add('saved'); btn.textContent = '✓'; setTimeout(() => { btn.textContent = 'Guardar'; btn.classList.remove('saved'); }, 1500); }
      showToast('Guardado');
      // Actualizar solo el id en el array si era nuevo
    }

    async function delEsp(id, usuario) {
      if (!confirm('¿Eliminar a ' + (usuario || 'este seguidor') + '?')) return;
      if (!String(id).startsWith('new_')) await sb.from('espiritus').delete().eq('id', id);
      espiritus = espiritus.filter(e => e.id !== id);
      renderEspTable();
      showToast('Eliminado');
    }

    // ── DRAG & DROP ──
    function espDragStart(e) { dragSrc = e.currentTarget; dragSrc.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', dragSrc.dataset.i); }
    function espDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function espDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function espDragEnd(e) { document.querySelectorAll('#esp-tbody tr').forEach(r => r.classList.remove('dragging', 'drag-over')); }
    async function espDrop(e) {
      e.preventDefault();
      const target = e.currentTarget;
      target.classList.remove('drag-over');
      const fromI = parseInt(e.dataTransfer.getData('text/plain'));
      const toI = parseInt(target.dataset.i);
      if (fromI === toI) return;
      const arr = [...espiritus];
      const [moved] = arr.splice(fromI, 1);
      arr.splice(toI, 0, moved);
      espiritus = arr;
      renderEspTable();
      // guardar orden en supabase
      await Promise.all(arr.map((esp, idx) => {
        if (!String(esp.id).startsWith('new_')) return sb.from('espiritus').update({ orden: idx }).eq('id', esp.id);
      }));
      showToast('Orden guardado');
    }
  </script>
</body>

</html>
